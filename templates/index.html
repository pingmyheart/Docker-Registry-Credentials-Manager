<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>Docker Registry Credentials Manager</title>

    <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        tr[data-href] {
            cursor: pointer;
        }

        tr[data-href]:hover {
            background-color: #f1f1f1;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Title Section -->
    <h1 class="mx-5 my-3"><a href="/" style="text-decoration: none; color: inherit;"><i class="bi bi-house"></i>
        Docker Registry Credentials Manager</a></h1>

    <!-- Add User Button -->
    <div class="row d-flex justify-content-end">
        <button class="btn btn-primary" data-bs-target="#createUserModel" data-bs-toggle="modal" type="button">
            <i class="bi bi-plus-lg"></i>
            Add User
        </button>
    </div>

    <!-- Add User Modal -->
    <div aria-hidden="true" aria-labelledby="createUserModelLabel" class="modal fade" id="createUserModel"
         tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="createUserModelLabel">Add User</h1>
                    <button aria-label="Close" class="btn-close" data-bs-dismiss="modal" type="button"></button>
                </div>
                <form action="{{ url_for('view_controller.create_new_user') }}" id="createUserForm" method="POST">
                    <div class="modal-body">
                        <div class="col-12">
                            <label class="form-label" for="username">Username</label>
                            <input class="form-control" id="username" name="username" required type="text">
                        </div>
                        <div class="col-12">
                            <label class="form-label" for="password">Password</label>
                            <input class="form-control" id="password" name="password" required type="password">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-primary" type="submit">Confirm</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Users Table -->
    <table class="table table-striped">
        <thead>
        <tr>
            <th scope="col">Username</th>
            <th scope="col">Actions</th>
        </tr>
        </thead>
        <tbody>
        {% for user in users %}
        <tr>
            <td>{{ user }}</td>
            <td>
                <!-- Reset Password -->
                <button class="btn btn-sm btn-outline-primary"
                        data-bs-target="#resetPasswordModal"
                        data-bs-toggle="modal"
                        data-username="{{ user }}">
                    <i class="bi bi-key"></i> Reset Password
                </button>
                <div class="modal fade" id="resetPasswordModal" tabindex="-1">
                    <div class="modal-dialog">
                        <div class="modal-content">

                            <div class="modal-header">
                                <h5 class="modal-title">Reset User Password</h5>
                                <button class="btn-close" data-bs-dismiss="modal" type="button"></button>
                            </div>

                            <form action="{{ url_for('view_controller.reset_user_password', username=user) }}"
                                  method="POST">
                                <div class="modal-body">
                                    <div class="mb-3">
                                        <label class="form-label">New Password</label>
                                        <input class="form-control" name="password" required type="password">
                                    </div>
                                </div>
                                <div class="modal-footer">
                                    <button class="btn btn-secondary" data-bs-dismiss="modal" type="button">
                                        Cancel
                                    </button>
                                    <button class="btn btn-primary" type="submit">
                                        Reset Password
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- Delete button -->
                <form action="{{ url_for('view_controller.delete_user', username=user) }}" method="POST"
                      style="display:inline;">
                    <button class="btn btn-sm btn-outline-danger" type="submit"><i class="bi bi-trash"></i>
                        Delete
                    </button>
                </form>
            </td>
        </tr>
        {% endfor %}
        </tbody>
    </table>
</div>

<script crossorigin="anonymous"
        integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q"
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
